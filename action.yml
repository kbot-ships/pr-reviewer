name: 'pr-reviewer'
description: 'Review a pull request with Claude, guided by a per-repo rubric.'
author: 'Krti Tallam'
branding:
  icon: 'check-circle'
  color: 'purple'

inputs:
  anthropic-api-key:
    description: 'Anthropic API key (store as a GitHub secret).'
    required: false
  rubric-path:
    description: 'Path to the rubric YAML file, relative to the repo root.'
    required: false
    default: '.github/pr-reviewer.yml'
  model:
    description: 'Claude model ID to use for review.'
    required: false
    default: 'claude-sonnet-4-6'
  max-diff-bytes:
    description: 'Skip review if the diff is larger than this many bytes.'
    required: false
    default: '200000'
  post-comment:
    description: 'Publish the review back to GitHub (true/false).'
    required: false
    default: 'true'
  submission-mode:
    description: 'How to publish the review: comment or review.'
    required: false
    default: 'comment'
  review-event:
    description: 'Review event when submission-mode=review: auto, comment, approve, or request_changes.'
    required: false
    default: 'auto'
  sticky-update:
    description: 'Update an existing bot-authored comment/review when possible instead of posting duplicates.'
    required: false
    default: 'true'
  fail-on-blocking:
    description: 'Exit non-zero if the review flags any blocking issues.'
    required: false
    default: 'false'
  max-retries:
    description: 'Number of retry attempts for transient Claude CLI failures.'
    required: false
    default: '2'
  retry-delay-seconds:
    description: 'Base delay between Claude retry attempts.'
    required: false
    default: '5'
  review-timeout-seconds:
    description: 'Best-effort timeout for one Claude review attempt.'
    required: false
    default: '900'
  fallback-command:
    description: 'Optional shell command to run if Claude fails after retries. The command receives SYSTEM_PROMPT_FILE, USER_PROMPT_FILE, REVIEW_FILE, and FALLBACK_MODEL env vars.'
    required: false
    default: ''
  fallback-name:
    description: 'Display name for the fallback engine in logs and outputs.'
    required: false
    default: 'fallback'
  fallback-model:
    description: 'Optional model identifier exposed to the fallback command as FALLBACK_MODEL.'
    required: false
    default: ''

outputs:
  review-path:
    description: 'Path to the written review markdown file.'
    value: ${{ steps.review.outputs.review-path }}
  blocking-count:
    description: 'Number of blocking issues the reviewer flagged.'
    value: ${{ steps.review.outputs.blocking-count }}
  engine-used:
    description: 'Which engine produced the final review.'
    value: ${{ steps.review.outputs.engine-used }}

runs:
  using: 'composite'
  steps:
    - name: Install Claude CLI
      shell: bash
      run: |
        curl -fsSL https://claude.ai/install.sh | bash
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"

    - name: Run review
      id: review
      shell: bash
      env:
        ANTHROPIC_API_KEY: ${{ inputs.anthropic-api-key }}
        RUBRIC_PATH: ${{ inputs.rubric-path }}
        MODEL: ${{ inputs.model }}
        MAX_DIFF_BYTES: ${{ inputs.max-diff-bytes }}
        POST_COMMENT: ${{ inputs.post-comment }}
        SUBMISSION_MODE: ${{ inputs.submission-mode }}
        REVIEW_EVENT: ${{ inputs.review-event }}
        STICKY_UPDATE: ${{ inputs.sticky-update }}
        FAIL_ON_BLOCKING: ${{ inputs.fail-on-blocking }}
        MAX_RETRIES: ${{ inputs.max-retries }}
        RETRY_DELAY_SECONDS: ${{ inputs.retry-delay-seconds }}
        REVIEW_TIMEOUT_SECONDS: ${{ inputs.review-timeout-seconds }}
        FALLBACK_COMMAND: ${{ inputs.fallback-command }}
        FALLBACK_NAME: ${{ inputs.fallback-name }}
        FALLBACK_MODEL: ${{ inputs.fallback-model }}
        GH_TOKEN: ${{ github.token }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        REPO: ${{ github.repository }}
      run: ${{ github.action_path }}/scripts/run-review.sh
