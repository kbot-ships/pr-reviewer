name: self-review

# Dogfood: run the reviewer against PRs on this repo itself.
# Uses the action from the PR's own checkout (not a released version)
# so changes to scripts/run-review.sh or prompts/ take effect immediately.

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Review PR with Claude
        uses: ./
        with:
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          rubric-path: .github/pr-reviewer.yml
          model: claude-sonnet-4-6
          fail-on-blocking: 'false'
